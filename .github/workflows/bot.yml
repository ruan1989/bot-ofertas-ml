name: Bot Ofertas ML

on:
  schedule:
    # A cada 20 minutos das 07h às 23h40 (Brasília = UTC-3)
    - cron: '0,20,40 10-23 * * *'   # 07:00-20:40 BRT
    - cron: '0,20,40 0,1,2 * * *'   # 21:00-23:40 BRT
  workflow_dispatch:  # permite rodar manualmente no GitHub

permissions:
  contents: write

jobs:
  rastrear:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Restaurar banco de dados (deduplicação)
        # Em cache-miss, mantém o DB versionado no repo (seed com histórico).
        uses: actions/cache@v4
        with:
          path: data/bot_ofertas.db
          key: sqlite-db-v2-${{ github.run_number }}
          restore-keys: |
            sqlite-db-v2-

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Instalar Playwright + Chromium
        run: python -m playwright install chromium --with-deps

      - name: Criar diretórios necessários
        run: mkdir -p data assets

      - name: Gerar banner ALERTA CUPOM
        run: python -m core.banner_cupom
        continue-on-error: true   # não trava o build se Pillow tiver problema

      - name: Rodar o bot (Mercado Livre)
        env:
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          CANAL_GERAL: ${{ secrets.CANAL_GERAL }}
          ML_AFFILIATE_TOOL_ID: ${{ secrets.ML_AFFILIATE_TOOL_ID }}
          WHATSAPP_GROUP_ID: ${{ secrets.WHATSAPP_GROUP_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: python rastreador.py

      - name: Rodar cupons Amazon (se configurado)
        env:
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          CANAL_GERAL: ${{ secrets.CANAL_GERAL }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          WHATSAPP_GROUP_ID: ${{ secrets.WHATSAPP_GROUP_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          if [ -n "$AMAZON_AFFILIATE_TAG" ]; then
            python rastreador_amazon.py
          else
            echo "AMAZON_AFFILIATE_TAG nao configurada — pulando Amazon."
          fi
        continue-on-error: true   # Amazon não bloqueia o ML

      - name: Salvar banco atualizado no cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/bot_ofertas.db
          key: sqlite-db-v2-${{ github.run_number }}

      - name: Atualizar site (GitHub Pages)
        if: success()
        env:
          PYTHONIOENCODING: utf-8
        run: python export_json.py

      - name: Commitar ofertas no site
        if: success()
        run: |
          git config user.name "Bot-Ofertas"
          git config user.email "bot@github.com"
          git add docs/data/offers.json
          git diff --cached --quiet || git commit -m "chore: atualiza ofertas do site [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
